<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 호감도 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Landing Page -->
        <div id="landing-page" class="page active">
            <header>
                <h1>💘 호감도 테스트</h1>
                <p>그 사람이 나를 얼마나 좋아할까?</p>
            </header>
            <div class="content">
                <div class="input-group">
                    <label>나의 성별</label>
                    <div class="radio-group">
                        <button type="button" class="option-btn" data-type="myGender" data-value="male">남성</button>
                        <button type="button" class="option-btn" data-type="myGender" data-value="female">여성</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>그 사람의 성별</label>
                    <div class="radio-group">
                        <button type="button" class="option-btn" data-type="targetGender" data-value="male">남성</button>
                        <button type="button" class="option-btn" data-type="targetGender" data-value="female">여성</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>연령대</label>
                    <select id="age-range" class="select-box">
                        <option value="10s">10대</option>
                        <option value="20s" selected>20대</option>
                        <option value="30s">30대</option>
                        <option value="40s">40대</option>
                        <option value="50s+">50대 이상</option>
                    </select>
                </div>
                <button id="start-btn" class="main-btn">테스트 시작하기</button>
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-page" class="page">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div id="quiz-container">
                <!-- Questions will be injected here -->
            </div>
            <div class="nav-btns">
                <button id="next-btn" class="main-btn" disabled>다음 (1/4)</button>
            </div>
        </div>

        <!-- Loading Page -->
        <div id="loading-page" class="page">
            <div class="ad-slot top">광고 영역 (상단)</div>
            <div class="loading-content">
                <div class="heart-loader"></div>
                <p>그 사람의 마음을 <br>분석하고 있습니다...</p>
            </div>
            <div class="ad-slot bottom">광고 영역 (하단)</div>
        </div>

        <!-- Result Page -->
        <div id="result-page" class="page">
            <div class="ad-slot top">광고 영역 (상단)</div>
            <div class="result-card">
                <h2 id="result-title">결과 타이틀</h2>
                <div id="result-level" class="level-badge">Lv. 7</div>
                <div class="result-image">
                    <img id="result-img" src="https://via.placeholder.com/300x200?text=Result+Image" alt="결과 이미지">
                </div>
                <p id="result-desc">결과 설명이 들어가는 자리입니다.</p>
                <div class="score-box">
                    <span>호감 점수: </span>
                    <strong id="result-score">0</strong>점
                </div>
            </div>
            <button id="restart-btn" class="main-btn">다시 테스트하기</button>
            <div class="ad-slot bottom">광고 영역 (하단)</div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
