
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>픽셀 아트 캐릭터 프리뷰</title>
    <style>
        body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 50px; font-family: sans-serif; }
        .preview-container { display: flex; gap: 40px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .character-box { display: flex; flex-direction: column; align-items: center; }
        .svg-wrap { width: 120px; height: 180px; image-rendering: pixelated; border: 1px solid #ddd; }
        h2 { margin-bottom: 20px; color: #333; }
        p { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h2>🎨 정밀 픽셀 아트 엔진 프리뷰 (1px 단위)</h2>
    <div class="preview-container">
        <div class="character-box">
            <div class="svg-wrap" id="char-1"></div>
            <p>20대 남성 (기본)</p>
        </div>
        <div class="character-box">
            <div class="svg-wrap" id="char-2"></div>
            <p>20대 여성 (기본)</p>
        </div>
        <div class="character-box">
            <div class="svg-wrap" id="char-3"></div>
            <p>30대 여성 (수줍음/홍조)</p>
        </div>
    </div>

    <script>
        function getPalette(age, gender) {
            const palettes = {
                "20s": { hair: "#4d3a31", top: "#63e6be", bottom: "#5c7cfa", skin: "#fff0e6", outline: "#1f1512" },
                "30s": { hair: "#2b1d18", top: "#ffadad", bottom: "#495057", skin: "#fff5f0", outline: "#1a110e" }
            };
            return palettes[age];
        }

        function generateSVG(gender, age, level) {
            const colors = getPalette(age, gender);
            const outline = colors.outline;
            const hair = colors.hair;
            const skin = colors.skin;
            const top = colors.top;
            const bottom = colors.bottom;

            return `
            <svg viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                <ellipse cx="20" cy="56" rx="10" ry="2" fill="rgba(0,0,0,0.1)"/>
                <g>
                    <!-- 머리카락 뒤쪽 -->
                    ${gender === 'female' ? `<rect x="10" y="16" width="20" height="24" fill="${hair}"/><rect x="9" y="16" width="1" height="23" fill="${outline}"/><rect x="30" y="16" width="1" height="23" fill="${outline}"/>` : ''}
                    
                    <!-- 몸체 -->
                    <rect x="14" y="40" width="12" height="14" fill="${bottom}"/>
                    <rect x="13" y="40" width="1" height="13" fill="${outline}"/><rect x="26" y="40" width="1" height="13" fill="${outline}"/><rect x="14" y="53" width="12" height="1" fill="${outline}"/>
                    
                    <rect x="11" y="28" width="18" height="14" fill="${top}"/>
                    <rect x="11" y="28" width="18" height="2" fill="white" opacity="0.15"/>
                    <rect x="10" y="29" width="1" height="13" fill="${outline}"/><rect x="29" y="29" width="1" height="13" fill="${outline}"/><rect x="11" y="41" width="18" height="1" fill="${outline}"/>

                    <!-- 얼굴 -->
                    <rect x="12" y="10" width="16" height="20" fill="${skin}"/>
                    <rect x="12" y="26" width="16" height="4" fill="black" opacity="0.05"/>
                    <rect x="11" y="12" width="1" height="18" fill="${outline}"/><rect x="28" y="12" width="1" height="18" fill="${outline}"/><rect x="12" y="29" width="16" height="1" fill="${outline}"/>

                    <!-- 눈동자 (광택 포함) -->
                    <rect x="16" y="19" width="2" height="3" fill="${outline}"/>
                    <rect x="16" y="19" width="1" height="1" fill="white" opacity="0.7"/>
                    <rect x="22" y="19" width="2" height="3" fill="${outline}"/>
                    <rect x="22" y="19" width="1" height="1" fill="white" opacity="0.7"/>

                    <!-- 머리카락 앞쪽 -->
                    <rect x="10" y="7" width="20" height="9" fill="${hair}"/>
                    <rect x="11" y="6" width="18" height="1" fill="${hair}"/><rect x="13" y="5" width="14" height="1" fill="${hair}"/>
                    <rect x="13" y="4" width="14" height="1" fill="${outline}"/>
                    <rect x="10" y="10" width="2" height="6" fill="${hair}"/>
                    <rect x="28" y="10" width="2" height="6" fill="${hair}"/>
                    
                    <!-- 홍조 -->
                    ${level >= 5 ? `<rect x="13" y="23" width="2" height="1" fill="#ffb6c1"/><rect x="25" y="23" width="2" height="1" fill="#ffb6c1"/>` : ''}
                </g>
            </svg>`;
        }

        document.getElementById('char-1').innerHTML = generateSVG('male', '20s', 0);
        document.getElementById('char-2').innerHTML = generateSVG('female', '20s', 0);
        document.getElementById('char-3').innerHTML = generateSVG('female', '30s', 5);
    </script>
</body>
</html>
